<div class="row">
  <div class="col-md-12 mt-3 mb-4">
    <p class="bc-2">Product projections</p>
  </div>
</div>
<div class="section-container">
  <div class="container-fluid py-4" style="background-color: #f3f4f6; min-height: 100vh;">

    <div class="projection-card mx-auto">

      <form [formGroup]="projectionForm">
        <div class="row">

          <!-- Month input -->
          <div class="col-md-4 col-xl-4">
            <div class="form-group">
              <label id="selectedMonth" title="Month">Month</label>
              <input class="form-control col-md-12" type="text" readonly [bsConfig]="dpConfig" #dp="bsDatepicker"
                bsDatepicker placeholder="mmm/YY" [bsValue]="today" formControlName="selectedMonth"
                (ngModelChange)="DateChange($event)" (onShown)="onOpenCalendar($event)">
            </div>
          </div>

          <!-- Product select -->
          <div class="col-md-3">
            <div class="form-group"> <label>Select Product:</label>
              <select class="form-control" formControlName="selectedProduct">
                <option value="" disabled>Select Product</option>
                <option *ngFor="let p of productList" [value]="p.pschemename"> {{ p.pschemename }} </option>
              </select>
            </div>
          </div>
        </div>
        <button type="button" class="btn btn-primary mt-2" (click)="addProduct()"> Add Product </button>

      </form>


      <!-- Product Table -->
      <div class="row" *ngIf="tabledisable">
        <table class="table table-bordered table-striped mt-4" *ngIf="productTable.length > 0">
          <thead>
            <tr>
              <th>Product Name</th>
              <th *ngFor="let m of nextMonths">{{ m }}</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let item of productTable">
              <td><b>{{ item.name }}</b></td>
              <td *ngFor="let m of nextMonths"> <input type="text" class="form-control"
                  [formControl]="item.form.controls[m]" placeholder="0" /> </td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- <div class="d-flex justify-content-end mt-2"> <button class="btn btn-success" (click)="saveData()">Save &
          Print</button> </div> -->
      <div *ngIf="savedisable">
        <div class="d-flex justify-content-end mt-3">
          <button data-toggle="tab" (click)="saveData()" class="btn btn-b-icon px-3 border-0" role="tab"
            aria-controls="hot" aria-selected="false">
            <img src="assets/images/icon-check-white.svg" width="20px" height="20px" class="mr-3" />
            Save & Print
          </button>

        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Editable row-like inputs */
  .editable-cell {
    width: 100%;
    border: none;
    outline: none;
    text-align: right;
    padding: 4px 6px;
    background-color: transparent;
    border-bottom: 1px solid #ccc;
  }

  .editable-cell:focus {
    border-bottom: 2px solid #007bff;
    background-color: #f8f9fa;
  }

  /* Keep compact table layout */
  .table td,
  .table th {
    vertical-align: middle;
    padding: 6px 10px;
    font-size: 14px;
  }

  /* Fix calendar picker position for <input type="month"> */
  input[type="month"]::-webkit-calendar-picker-indicator {
    position: absolute;
    right: 10px;
    cursor: pointer;
    z-index: 5;
  }

  input[type="month"] {
    position: relative;
    padding-right: 30px;
    /* space for icon */
  }

  /* Remove alternating gray stripes */
  .table-striped tbody tr:nth-of-type(odd) {
    background-color: #ffffff !important;
  }

  /* Remove alternating gray stripes */
  .table-striped tbody tr:nth-of-type(even) {
    background-color: #ffffff !important;
  }

  /* Make the whole table background white */
  .table {
    background-color: #ffffff !important;
  }
</style>
