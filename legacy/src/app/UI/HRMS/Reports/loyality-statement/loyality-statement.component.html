<div class="section-container">
    <div class="row p-0">
        <div class="col-xl-12 col-md-12">
            <div class="section-content ">
                <form [formGroup]="loyalityStatementForm">

                    <div class="row mt-3">
                        <div class="col-md-4 col-xl-4">
                            <div class="form-group">
                                <label title="Year" id="year" class="required-field">Year</label>
                                <ng-select  title="Year" [items]="calendarYearData"
                                    formControlName="year" bindLabel="pPeriodType" bindValue="pCalenderPeriodId"
                                    [multiple]="false" placeholder="Select" [searchable]="true" [clearable]="true"
                                    dropdownPosition="bottom" [clearOnBackspace]="true"
                                    (change)="CalendarYear_change($event)"
                                    [ngClass]="{ 'is-invalid': loyalityStatementValidation.year }">
                                </ng-select>
                                <div class="invalid-feedback">
                                    <span
                                        *ngIf="loyalityStatementValidation.year">{{loyalityStatementValidation?.year}}</span>
                                </div>
                            </div>
                        </div>


                        <div class="col-md-4 col-xl-4">
                            <div class="form-group">
                                <label title="Month" id="month" class="required-field">Month</label>
                                <ng-select  title="Month" [items]="calendarMonthData"
                                    formControlName="month" bindLabel="pCalendarMonth"
                                    bindValue="pCalenderPeriodDetailsId" [multiple]="false" placeholder="Select Month"
                                    [searchable]="true" [clearable]="true" dropdownPosition="bottom"
                                    [clearOnBackspace]="true" (change)="CalendarMonth_change($event)"
                                    [ngClass]="{ 'is-invalid': loyalityStatementValidation.month }">
                                </ng-select>
                                <div class="invalid-feedback">
                                    <span
                                        *ngIf="loyalityStatementValidation.month">{{loyalityStatementValidation?.month}}</span>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-2 col-xl-2">
                            <div class="form-group">
                                <br>
                                <a aria-controls="hot" aria-selected="false" class="btn btn-b-icon px-3 border-0" data-toggle="tab" role="tab" (click)="RunLoyalityStatement()">
                                    <i class="fa" [ngClass]="{'fa-spin fa-spinner': isLoading}"></i>
                                    <span *ngIf="!isLoading"><img class="mr-3" height="20px" src="assets/images/reports-white.svg"
                                      width="20px"></span> Show
                                </a>
                            </div>
                        </div>

                    </div>
                </form>

                <div class="row mt-2">
                    <div class="col-md-12">        
                        <div class="form-group pt-2">
                            <div class="d-flex justify-content-end" *ngIf="gridData.length!=0">
                                <a  class="export-icons" (click)="pdfOrprint('Pdf')">
                                    <img src="assets/images/pdf-icon-blue.svg " title="pdf" width="18px">
                                </a>
                           
                                <a  class="export-icons" (click)="pdfOrprint('Print')">
                                    <img src="assets/images/print-icon-blue.svg " title="Print" width="18px">
                                </a>
                            </div>
                        </div>
                    </div>
                </div>


                <kendo-grid [kendoGridBinding]="gridData" [pageSize]="pageSize" [pageable]="{buttonCount: 2}"
                    [reorderable]="true" [sortable]="true" [resizable]="true">

                    <kendo-grid-column field="employee_code" title="Emp Code" [headerClass]="{'kendo-g-center': true}"
                        class="kendo-center" width="90">
                    </kendo-grid-column>

                    <kendo-grid-column field="contactmailingname" title="Employee Name" width="140"
                        [headerClass]="{'kendo-g-center': true}" class="kendo-center"></kendo-grid-column>

                    <kendo-grid-column field="allowanceamount" title="Loyalty Allowances Amount" width="150"
                        [headerClass]="{'kendo-g-center': true}" class="kendo-center">
                        <ng-template kendoGridCellTemplate let-dataItem="dataItem">
                            <span>  {{dataItem.allowanceamount | mycurrencypipe}}</span>
                          </ng-template>
                    </kendo-grid-column>

                    <kendo-grid-column field="dateofjoining" title="Joining Date" width="140"
                        [headerClass]="{'kendo-g-center': true}" class="kendo-center">
                        <ng-template kendoGridCellTemplate let-dataItem>
                            {{dataItem.dateofjoining | date: 'dd-MM-yyyy'}}
                        </ng-template>
                    </kendo-grid-column>

                    <kendo-grid-column field="years" width="60" title="Years"
                        [headerClass]="{'kendo-g-center': true}" class="kendo-center">
                    </kendo-grid-column>

                </kendo-grid>

            </div>
        </div>
    </div>
</div>
