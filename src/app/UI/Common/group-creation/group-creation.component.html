
<div class="row">
        <div class="col-md-6 col-xl-6">
          <p class="bc-2">
                Group Creation  </p>
        </div>
        
        <div class="col-md-6 col-xl-6">
         <a class="btn btn-b-icon border-0" style="background-color: #4b70ff;
         color: #fff; padding: 5px 10px 3px 0px;cursor: pointer;float: right;" routerLink="/GroupView">
            <img width="25" height="25" class="" src="assets/images/icon-back-blue.svg">View
          </a>
        </div>
      </div>
      <div class="row mt-3">
       <div class="col-md-12">
      <div class="section-container">
<form [formGroup]="CreateGroupform">
       



         <div class="row mt-2 ">
        <div class="col-md-4 col-xl-4">
          <div class="form-group">
            <label id="pTransdate" title="Date">Date</label>        
              <input type="text" class="form-control" readonly placeholder="Date picker here"
                     formControlName="pTransdate"  [bsConfig]="dpConfig" #dp="bsDatepicker" [bsValue]="bsValue" bsDatepicker
                     placement="bottom" [ngClass]="{ 'is-invalid': GroupcreationValidationErrors.pTransdate }" />      
           <app-validation-message [messgae]="GroupcreationValidationErrors?.pTransdate"></app-validation-message>
          </div>
        </div>
      </div>
    
    <div class="row mt-2">
        <!-- <div class="col-md-12 col-xl-12">
            <h2 class="sec-head-bold">Create Group</h2>
        </div> -->
        
        <div class="col-md-12 col-lg-12 col-xl-12">
        <div class="form-group">
                                    <div class="form-check form-check-inline mr-5 radio-btn-secondary">
                                        <input class="form-check-input" type="radio" name="pGroupType" formControlName="pGroupType" (click)="Liability_Change('Individual Liability')" value="Individual Liability" id="pGroupType1" [disabled]="CreateGroupformArrayview.length>0">
                                        <label class="mt-1" for="pGroupType1"> Individual Liability </label>
                                    </div>
                                    <div class="form-check form-check-inline mr-5 radio-btn-secondary">
                                        <input class="form-check-input" type="radio" name="pGroupType" value="Joint Liability for all
         Group Members" formControlName="pGroupType" [disabled]="CreateGroupformArrayview.length>0" (click)="Liability_Change('Joint Liability')" id="pGroupType2" value="Joint Liability">
                                        <label class="mt-1" for="pGroupType2"> Joint Liability for all
                        Group Members </label>
                                    </div>
                                </div>
            <!-- <div class="form-group mt-2 ">
                <div class="form-check form-check-inline mr-5 radio-btn-secondary ">
                    <input class="form-check-input" type="radio" formControlName="pGroupType" id="pGroupType" [ngClass]="{ 'is-invalid':GroupcreationValidationErrors.pGroupType  }" value="Individual Liability" [disabled]="CreateGroupformArrayview.length>0">
                    <label class="mt-1" for="pGroupType" title="pGroupType" id="pGroupType"> Individual Liability
                    </label>
                </div>
                <div class="form-check form-check-inline mr-5 radio-btn-secondary">
                    <input class="form-check-input" type="radio" formControlName="pGroupType" id="pGroupType" [ngClass]="{ 'is-invalid':GroupcreationValidationErrors.pGroupType  }" value="Joint Liability for all Group Members" [disabled]="CreateGroupformArrayview.length>0">
                    <label class="mt-1" for="pGroupType" title="pGroupType" id="pGroupType"> Joint Liability for all
                        Group Members </label>
                </div>
                <div class="invalid-feedback">
                    <span *ngIf="GroupcreationValidationErrors.pGroupType">{{GroupcreationValidationErrors?.pGroupType}}</span>
                </div>
            </div> -->
        </div>

        <div class="col-md-4 col-xl-4">
            <div class="form-group">
                <label class="mt-1" title="Group Name" id="pGroupName"> Group Name</label>
                <input type="text" class="form-control" formControlName="pGroupName" [ngClass]="{ 'is-invalid':GroupcreationValidationErrors.pGroupName  }" maxlength="25" minlength="3" [readonly]="CreateGroupformArrayview.length>0" (change)="GroupNameCode_Change()" appUppercase appCharacterwithspecial>
                <!-- <div *ngIf=" submitted &&  f.pGroupName.errors" class="invalid-feedback">
                    <div *ngIf="f.pGroupName.errors.required">{{GroupcreationValidationErrors?.pGroupName}}</div>
                </div> -->
                <div class="invalid-feedback">
                    <span *ngIf="GroupcreationValidationErrors.pGroupName">{{GroupcreationValidationErrors?.pGroupName}}</span>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-xl-4" hidden>
            <div class="form-group">
                <label class="mt-1" title="Group Code" id="pGroupCode"> Group Code</label>
                <input type="text" class="form-control" [ngClass]="{ 'is-invalid':GroupcreationValidationErrors.pGroupCode  }" formControlName="pGroupCode" minlength="3" maxlength="10" [readonly]="CreateGroupformArrayview.length>0" (change)="GroupNameCode_Change()" appUppercase appCharacterwithspecial>
                <!-- <div *ngIf=" submitted &&  f.pGroupCode.errors" class="invalid-feedback">
                    <div *ngIf="f.pGroupCode.errors.required">{{GroupcreationValidationErrors?.pGroupCode}}</div>
                </div> -->
                <div class="invalid-feedback">
                    <span *ngIf="GroupcreationValidationErrors.pGroupCode">{{GroupcreationValidationErrors?.pGroupCode}}</span>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-xl-4">
            <div class="form-group">
                <label class="mt-1" title="Member Count" id="pMembersCount"> Member Count</label>
                <input type="text" class="form-control" [ngClass]="{ 'is-invalid':GroupcreationValidationErrors.pMembersCount  }" formControlName="pMembersCount" appNumbersonly removeZero maxlength="2" minlength="1" [readonly]="ListGroupDetails.length>0">
                <!-- <div *ngIf=" submitted &&  f.pMembersCount.errors" class="invalid-feedback">
                    <div *ngIf="f.pMembersCount.errors.required">{{GroupcreationValidationErrors?.pMembersCount}}</div>
                </div> -->
                <div class="invalid-feedback">
                    <span *ngIf="GroupcreationValidationErrors.pMembersCount">{{GroupcreationValidationErrors?.pMembersCount}}</span>
                </div>
            </div>
        </div>

        <div class="col-md-12 col-xl-12">
         <label class="mt-1" title="Contact" >Select Member</label>
            <div class="individual">
                <app-member-select (ContactpersondataEventemit)="GetContactPersonData($event)"></app-member-select>
            </div>
        </div>
        <div class="col-md-4 col-xl-4">
            <div class="form-group">
                <label title="Role in the Group" id="pGrouproleID">Role in the Group</label>
                <div class="input-group">
                    <select class="form-control" formControlName="pGrouproleID" [ngClass]="{ 'is-invalid':GroupcreationValidationErrors.pGrouproleID  }">
                        <option value="" disabled="disabled">Please Select</option>
                        <option *ngFor="let role of roleInTheGroupData" [value]="role.pGroupRoleId">
                            {{role.pGroupRoleName}}</option>
                    </select>
                    <div class="invalid-feedback">
                        <span *ngIf="GroupcreationValidationErrors.pGrouproleID">{{GroupcreationValidationErrors?.pGrouproleID}}</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-12 col-xl-12">
            <div class=" border-0  mb-4">
                <div class="row">
                    <div *ngIf="ShowContactBusiness">
                        <div class="Business">
                            <app-contact-select (ContactpersondataEventemit)="GetContactPersonData($event)"></app-contact-select>
                        </div>
                    </div>
           <div class="col-md-12">
                    <div class="d-flex justify-content-end">
                      <a appButtonDoubleClick [debounceTime]="500" (debounceClick)="submitCreateGroupform()" 
              class="btn btn-b-icon mr-4 px-3 border-0"><img src="assets/images/icon-add-white.svg" width="20px"
                height="20px" class="mr-3" />Add</a>
                      
                    </div>
                </div>
                    <!--dropdown-end-->
                </div>
                <!--row-end-->
            </div>
        </div>
    </div>


    
</form>


<div class="row">
    <div class="col-12">
        <kendo-grid [data]="ListGroupDetails" [height]="300" [pageSize]="gridState.take" [skip]="gridState.skip" [sort]="gridState.sort" [pageable]="true" [sortable]="true" (remove)="removeHandler($event)">
            <kendo-grid-command-column title="" width="100">
                    <ng-template kendoGridCellTemplate let-dataItem>
                         <button kendoGridRemoveCommand><div id="icon-delete"></div></button>
                    </ng-template>
                </kendo-grid-command-column>
            <kendo-grid-column field="pRoleInGroup" title="Role in the Group"></kendo-grid-column>
            <kendo-grid-column field="pContactName" title="Member Name"></kendo-grid-column>
            <kendo-grid-column field="pContactNo" title="Contact Number"></kendo-grid-column>
        </kendo-grid>
    </div>
</div>
<!--row-end-->

</div> -->
  <div class="row">
                        <div class="col-md-12 col-xl-12">
                            <div class="">
                                <div class="d-flex justify-content-end mt-3">
                                 <a appButtonDoubleClick [debounceTime]="500" (debounceClick)="Clear()"
              class="btn btn-g-icon mr-4 px-3 border-0"><img src="assets/images/icon-cancel-white.svg" width="20px"
                height="20px" class="mr-3" />Clear</a>

            <a appButtonDoubleClick [debounceTime]="500" (debounceClick)="saveGroupArray()" data-toggle="tab"
              class="btn btn-b-icon px-3 border-0" role="tab" aria-controls="hot" aria-selected="false"><i class="fa"
                [ngClass]="{'fa-spin fa-spinner': disablesavebutton, 'fa-check': !disablesavebutton}"></i>
              {{savebutton}}</a>
                                        </div>
                                    </div>
                                </div>
                            </div>
</div>
</div>
</div>
