<div class="row">
    <div class="col-md-6 col-xl-6">
        <a class="btn btn-b-icon border-0" routerLink="/MaturityBondNew" style="float: left;" (click)="NewButtonClick('New')">
            <img width="20" height="20" class="mr-2" src="assets/images/icon-add-white.svg">New
        </a>
    </div>

</div>
<div class="row mt-3">
    <div class="col-md-12 col-xl-12">
        <div class="section-container">

            <kendo-grid [kendoGridBinding]="griddata" [groupable]="false"
            [resizable]="true" [pageSize]="10" [skip]="skip" [reorderable]="false"
            [columnMenu]="{ filter: false }" [pageable]="{ buttonCount: 2 }" [sortable]="true"
            (remove)="removeHandler($event)">
  <ng-template kendoGridToolbarTemplate>

    <div class="row mb-2">
      <div class="col-4 pl-0 mt-n1">
        <input placeholder="Search in all columns..." kendoTextBox class="form-control search-k-cst sb"
               (input)="SearchRecord($event.target.value)" />
      </div>

      <div class="col-12 mt-5">
        <ul class="temp-ul pull-right mr-4 pb-3">
          <li class="temp-ico ml-2">
            <a kendoGridPDFCommand><img class="pt-2" src="assets/images/pdf-icon-blue.svg " title="pdf"
                width="20px"></a>
          </li>
          
          <li class="temp-ico ml-2">
            <a kendoGridExcelCommand><img class="pt-2" src="assets/images/icon-excel.svg " title="excel"
                width="20px"></a>
          </li>
        </ul>
      </div>

    </div>
  </ng-template>
  <kendo-grid-column-group title="Maturity Bond" [headerClass]="{'kendo-g-center' : true}">

    <kendo-grid-column field="pMembername" title="Member Name" width="150"></kendo-grid-column>
    
    <kendo-grid-column field="pFdaccountno" title="Account No." width="150">
      <ng-template kendoGridCellTemplate let-dataItem>
        <a (click)="GetAccountDetails(dataItem)">{{dataItem.pFdaccountno }}</a>
      </ng-template>
    </kendo-grid-column>

    <kendo-grid-column field="pFdname" title="Advance Name" width="150"></kendo-grid-column>
    <kendo-grid-column field="pTransdate" title="Transaction Date" width="150"></kendo-grid-column>
    <kendo-grid-column field="pDepositamount" title="Advance Amount" width="150" class="kendo-center">
        <ng-template let-dataItem let-rowIndex="rowIndex" kendoGridCellTemplate>
          {{dataItem.pDepositamount|mycurrencypipe}}
        </ng-template>
      </kendo-grid-column>
    
    <kendo-grid-column field="pTenure" title="Tenure" width="90"></kendo-grid-column>

    
    <kendo-grid-column field="pInterestpayble" title="Interest Payable" width="150" class="kendo-center">
      <ng-template let-dataItem let-rowIndex="rowIndex" kendoGridCellTemplate>
        {{dataItem.pInterestpayble|mycurrencypipe}}
      </ng-template>
    </kendo-grid-column>
    <kendo-grid-column field="pNetpayable" title="Net Payable" width="150" class="kendo-center">
        <ng-template let-dataItem let-rowIndex="rowIndex" kendoGridCellTemplate>
          {{dataItem.pNetpayable|mycurrencypipe}}
        </ng-template>
      </kendo-grid-column>

      <kendo-grid-column field="pMaturitytype" title="Maturity Type" width="150" class="kendo-center">
        <ng-template let-dataItem let-rowIndex="rowIndex" kendoGridCellTemplate>
            <div *ngIf="dataItem.pMaturitytype == 'Pre-Maturity'" class="text-success">
                {{dataItem.pMaturitytype}}
            </div>
            <div *ngIf="dataItem.pMaturitytype!== 'Pre-Maturity'" class="text-primary">
                {{dataItem.pMaturitytype}}
            </div>        
        </ng-template>
      </kendo-grid-column>  



  </kendo-grid-column-group>

  <kendo-grid-pdf fileName="Maturity_Bond.pdf" [allPages]="true" paperSize="A4"
                [repeatHeaders]="true" [scale]="0.5" [margin]="0.5" [landscape]="true">

                <kendo-grid-pdf-margin top="4.5cm" left="0.5cm" right="0.5cm"
                  bottom="2cm"></kendo-grid-pdf-margin>

                <ng-template kendoGridPDFTemplate>
                  <div class="page-template">
                    <div class="header">
                      <app-company-details></app-company-details>

                      <div class="report-head mt-2">
                        <p class="font-20 text-dark text-center m-0">
                            <span class="text-capitalize">  Maturity Bond</span>
                        </p>

                    </div>

                     

                    </div>

                  </div>
                </ng-template>

              </kendo-grid-pdf>


  <kendo-grid-excel fileName="Maturity_Bond.xlsx" [fetchData]="allData"></kendo-grid-excel>

</kendo-grid>

    </div>
