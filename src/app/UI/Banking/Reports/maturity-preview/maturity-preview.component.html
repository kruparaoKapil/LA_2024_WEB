<div class="col-md-12 mt-5 mb-4">
    <div id="template">
        <div class="d-flex justify-content-end mr-3">
            <ul class="temp-ul">
                <li class="temp-ico ml-2">
                    <img src="assets/images/pdf-icon-blue.svg " width="18px" class="pt-2" title="pdf"
                        style="cursor: pointer;" kendo-button (click)="pdf.saveAs(printFileName+'.pdf')" />
                </li>
                <!-- <li class="temp-ico ml-2">
                    <img src="assets/images/print-icon-blue.svg " width="18px" class="pt-2" title="print"
                        (click)="print()" style="cursor: pointer;" />
                </li> -->
            </ul>

        </div>

        <div class="container">
            <div class="row">
                <div class="col-md-12">

                    <kendo-pdf-export #pdf paperSize="A4" margin="1cm" [allPages]="false" [repeatHeaders]="true"
                        [landscape]="false" [scale]="0.7">
                        <div id="temp-box">
                            <div class="row">
                                <div class="col-md-12">
                                    <app-company-details></app-company-details>

                                    <div class="report-head">
                                        <p class="font-18 text-dark text-center m-0">
                                            Maturity Details
                                        </p>
                                    </div>
                                </div>
                            </div>
                            <div class="temp-box-inner border rounded shadow-sm bg-white p-3"
                                style="overflow:hidden; height:auto !important;">
                                <div class="row">
                                    <div class="col-md-12">
                                        <p class="font-18 text-dark text-center m-0">
                                            <span class="font-16">(Num Id : 985 )</span>
                                        </p>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="border p-2 h-200">
                                            <div class="row">
                                                <div class="col-md-12">

                                                </div>
                                                <div class="col-md-12">

                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Mode Of Extra
                                                        Return </label>
                                                    <label class="font-weight-normal">: Monthly</label>
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Scheme Amount
                                                    </label>
                                                    <label class="font-weight-normal">: 1,00,000</label>
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Extra Return
                                                        Amount </label>
                                                    <label class="font-weight-normal">: 1,0000.00</label>
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">TDS Amount
                                                    </label>
                                                    <label class="font-weight-normal">: 1,0000.00</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="border p-2 h-200">
                                            <div class="row">
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Member Name 
                                                    </label>
                                                    <label class="font-weight-normal">: Kadukuri Kiran</label>
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Maturity
                                                        Date</label>
                                                    <label class="font-weight-normal">: 22-Jan-2020</label>
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Period </label>
                                                    <label class="font-weight-normal">: Monthly</label>
                                                </div>
                                                <div class="col-md-12">
                                                    <label class="bc-1 font-14 text-left m-0 mr-4 w-50">Net Payble
                                                    </label>
                                                    <label class="font-weight-normal">: 1,00,000</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-12">

                                                <td>S.No</td>
                                                <td>Kapil Branch Name</td>
                                                <td>Group Code Ticket No</td>
                                                <td>Lien Amount</td>
                                                <td>Released By</td>
                                                <td>Release Date</td>
                                            </tr>
                                            <tr>
                                                <td>1</td>
                                                <td>Kapil Branch Name</td>
                                                <td>Group Code Ticket No</td>
                                                <td>Lien Amount</td>
                                                <td>Released By</td>
                                                <td>Release Date</td>
                                            </tr>
                                        </table>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="form-check mt-2">
                                            <input type="checkbox" class="form-check-input"
                                                id="originalCertificateCheck"
                                                (change)="clickOriginalCertificate($event)">
                                            <label class="form-check-label" for="originalCertificateCheck">Original
                                                Certificate: {{originalCertificate}}</label>
                                        </div>
                                        <div class="form-check mt-2">
                                            <input type="checkbox" class="form-check-input" id="panCardCheck" (change)="panCard($event)">
                                            <label class="form-check-label" for="panCardCheck">PAN Card: {{paCard}}</label>
                                        </div>
                                        <div class="form-check mt-2">

                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="form-check mt-2">
                                            <input type="checkbox" class="form-check-input"

                                            <label class="form-check-label" for="originalApplicationCheck">Original

                                    </div>
                                    <div class="col-md-3 col-sm-3" style="bottom:0px;">

                                    <div class="col-md-3 col-sm-3">

                                    </div>
                                    <div class="col-md-3 col-sm-3">

                                    </div>

                </div>
            </div>
        </div>

    </div>
</div>
