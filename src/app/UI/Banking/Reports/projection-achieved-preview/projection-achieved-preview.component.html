        </div>
      </div>
    </div>

<div class="border shadow-sm bg-white p-3" style="overflow:visible; width:auto; height:auto !important;">
  <table class="table table-bordered table-striped text-center align-middle">
    <thead>
      <tr>
        <th *ngFor="let header of mainHeaders" [attr.colspan]="header.colspan">{{ header.label }}</th>
      </tr>
      <tr>
        <th *ngFor="let sub of subHeaders">{{ sub }}</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let row of excelData.slice(1)">
        <td *ngFor="let cell of row">{{ cell }}</td>
      </tr>
    </tbody>
  </table>
</div>



  </div>
</kendo-pdf-export>



<style>
  .table {
  width: 100%;
  border-collapse: collapse;
}

.table th,
.table td {
  white-space: nowrap;
  text-align: center;
  vertical-align: middle;
}

.table-bordered th,
.table-bordered td {
  border: 1px solid #ddd;
}

/* Allow wrapping only for Product Name column */
.table td:first-child,
.table th:first-child {
  white-space: normal !important;   /* allows wrapping */
  word-wrap: break-word;
  max-width: 180px;                 /* adjust as needed */
}

/* Keep other columns compact */
.table td:not(:first-child),
.table th:not(:first-child) {
  white-space: nowrap;
  text-align: center;
}

/* Optional: consistent vertical alignment */
.table th, .table td {
  vertical-align: middle;
}


</style>
